<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Digital | Perfil</title>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="container-header">
            <img src="icon.png" alt="Logo" class="logo-img">
            <h1 class="app-name">Nexus <span>Digital</span></h1>
        </div>
    </header>

    <main class="profile-container">
    <div class="banner-wrapper">
        <img src="banner.jpg" alt="Banner" class="profile-banner">
        <div class="banner-overlay"></div>
        <a href="editar.html" class="btn-edit-floating">Editar Perfil</a>
    </div>

    <div class="profile-header">
        <div class="avatar-container">
            <img src="user-photo.jpg" alt="Avatar" class="profile-avatar">
            <div class="status-badge">
                <img src="status-online.png" alt="Status">
                <span>Online</span>
            </div>
        </div>
        
        <h2 class="profile-nick">Nick de Usuário</h2>
    </div>

    <section class="about-section">
        <label>Sobre a mim</label>
        <div class="about-box">
            <p>Escreva algo incrível sobre você aqui...</p>
        </div>
    </section>
</main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <img src="home-icon.png" alt="Início" class="nav-icon">
            <span>Início</span>
        </a>
        <a href="perfil.html" class="nav-item active">
            <img src="profile-icon.png" alt="Perfil" class="nav-icon">
            <span>Perfil</span>
        </a>
    </nav>

    </body>
</html>
