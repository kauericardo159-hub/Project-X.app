<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Perfil</title>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-profile">

    <header class="navbar">
        <div class="container-header">
            <img src="icon.png" alt="Logo" class="logo-img">
            <h1 class="app-name">Nexus <span>Digital</span></h1>
        </div>
    </header>

    <main class="profile-container">
        <div class="banner-wrapper" id="bannerDisplay">
            <img src="banner.jpg" alt="Banner" class="profile-banner" id="userBanner">
            <div class="banner-overlay"></div>
            <a href="editar.html" class="btn-edit-action">Editar Perfil</a>
        </div>

        <div class="profile-header">
            <div class="avatar-container">
                <img src="user-photo.jpg" alt="Avatar" class="profile-avatar" id="userPhoto">
                
                <div class="status-badge">
                    <img src="status-online.png" alt="Status" class="status-dot">
                    <span>Online</span>
                </div>
            </div>
            
            <h2 class="profile-nick" id="displayNick">Nick de Usuário</h2>
        </div>

        <section class="about-section">
            <label class="label-purple">Sobre a mim</label>
            <div class="about-box">
                <p id="displayBio">Escreva algo incrível sobre você aqui...</p>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <img src="home-icon.png" alt="Início" class="nav-icon">
            <span>Início</span>
        </a>
        <a href="perfil.html" class="nav-item active">
            <img src="profile-icon.png" alt="Perfil" class="nav-icon">
            <span>Perfil</span>
        </a>
    </nav>

    <script>
        window.onload = function() {
            const savedNick = localStorage.getItem('nexus_nick');
            const savedBio = localStorage.getItem('nexus_bio');
            const savedPhoto = localStorage.getItem('nexus_photo');
            const savedBanner = localStorage.getItem('nexus_banner');

            if (savedNick) document.getElementById('displayNick').innerText = savedNick;
            if (savedBio) document.getElementById('displayBio').innerText = savedBio;
            if (savedPhoto) document.getElementById('userPhoto').src = savedPhoto;
            if (savedBanner) {
                // Se for um vídeo (base64 de vídeo), criamos a tag video
                if (savedBanner.includes("video")) {
                    const videoTag = `<video src="${savedBanner}" autoplay loop muted class="profile-banner"></video>`;
                    document.getElementById('bannerDisplay').innerHTML = videoTag + '<div class="banner-overlay"></div><a href="editar.html" class="btn-edit-action">Editar Perfil</a>';
                } else {
                    document.getElementById('userBanner').src = savedBanner;
                }
            }
        };
    </script>

</body>
</html>
