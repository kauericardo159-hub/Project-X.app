<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Project X</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="perfil-page">

    <header class="navbar-topo">
        <div class="logo-container">
            <img src="icon.png" alt="Logo" class="site-icon">
            <span class="site-name">Project X - Alpha</span>
        </div>
    </header>

    <section class="perfil-container">
        <div class="banner-wrapper">
            <img src="banner.jpg" id="display-banner" alt="Banner" class="user-banner">
            <a href="EditarPerfil.html" class="btn-editar">Editar Perfil</a>
        </div>

        <div class="perfil-header">
            <div class="foto-frame">
                <img src="user-photo.jpg" id="display-photo" alt="Foto de Perfil" class="user-photo">
            </div>
            <h1 id="display-nick" class="user-nick">Seu Nick Aqui</h1>
        </div>

        <div class="perfil-bio">
            <h3>Sobre mim:</h3>
            <hr>
            <p id="display-bio" class="bio-text">
                Escreva algo sobre você aqui. Esta é a sua descrição galáctica dentro do Project X.
            </p>
        </div>
    </section>

    <nav class="menu-inferior">
        <a href="index.html" class="nav-item">
            <img src="home-icon.png" alt="Home">
            <span>Home</span>
        </a>
        <a href="perfil.html" class="nav-item active">
            <img src="profile-icon.png" alt="Profile">
            <span>Profile</span>
        </a>
    </nav>

    <script>
        window.onload = function() {
            // Busca os dados salvos no navegador
            const savedNick = localStorage.getItem('userNick');
            const savedBio = localStorage.getItem('userBio');
            const savedPhoto = localStorage.getItem('userPhoto');
            const savedBanner = localStorage.getItem('userBanner');

            // Se existirem dados salvos, substitui os padrões
            if (savedNick) {
                document.getElementById('display-nick').innerText = savedNick;
            }
            if (savedBio) {
                document.getElementById('display-bio').innerText = savedBio;
            }
            if (savedPhoto) {
                document.getElementById('display-photo').src = savedPhoto;
            }
            if (savedBanner) {
                document.getElementById('display-banner').src = savedBanner;
            }
        };
    </script>

</body>
</html>
