<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - Project X</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="edit-page">

    <div class="edit-container">
        <h2>Editar Perfil</h2>

        <div class="input-group">
            <label>ID da Conta (Imutável)</label>
            <input type="text" id="edit-id" disabled style="opacity: 0.5; cursor: not-allowed;">
        </div>

        <div class="input-group">
            <label>Foto de Perfil</label>
            <input type="file" id="input-photo" accept="image/*" onchange="previewImage(this, 'preview-photo')">
            <img src="user-photo.jpg" id="preview-photo" class="edit-preview-circle">
        </div>

        <div class="input-group">
            <label>Banner</label>
            <input type="file" id="input-banner" accept="image/*" onchange="previewImage(this, 'preview-banner')">
            <img src="banner.jpg" id="preview-banner" class="edit-preview-rect">
        </div>

        <div class="input-group">
            <label>Nome de Exibição</label>
            <input type="text" id="edit-nick" placeholder="Seu nome">
        </div>

        <div class="input-group">
            <label>Nome de Usuário (@)</label>
            <input type="text" id="edit-user" placeholder="@usuario">
            <small id="user-change-info" style="color: #888; font-size: 0.75rem;"></small>
        </div>

        <div class="input-group">
            <label>Sobre mim</label>
            <textarea id="edit-bio" rows="4"></textarea>
        </div>

        <div class="edit-actions">
            <button class="btn-cancelar" onclick="window.location.href='perfil.html'">Cancelar</button>
            <button class="btn-confirmar" onclick="salvarPerfil()">Salvar Alterações</button>
        </div>
    </div>

    <script src="components.js"></script>
    <script>
        // Carregar dados atuais
        window.onload = function() {
            const userAtivo = localStorage.getItem('usuarioLogado');
            const db = JSON.parse(localStorage.getItem('db_usuarios')) || {};
            const dados = db[userAtivo] || {};

            document.getElementById('edit-id').value = dados.id || 'N/A';
            document.getElementById('edit-nick').value = localStorage.getItem('userNick') || '';
            document.getElementById('edit-user').value = userAtivo || '';
            document.getElementById('edit-bio').value = localStorage.getItem('userBio') || '';
            document.getElementById('preview-photo').src = localStorage.getItem('userPhoto') || 'user-photo.jpg';
            document.getElementById('preview-banner').src = localStorage.getItem('userBanner') || 'banner.jpg';

            // Verificar data da última alteração do @
            const ultimaTroca = localStorage.getItem('lastUserChange');
            if (ultimaTroca) {
                const dataLibera = new Date(parseInt(ultimaTroca) + (7 * 24 * 60 * 60 * 1000));
                document.getElementById('user-change-info').innerText = `Disponível para troca em: ${dataLibera.toLocaleString()}`;
            }
        };

        // Preview de Imagem (Corrige visualização antes de salvar)
        function previewImage(input, previewId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById(previewId).src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function salvarPerfil() {
            const novoNick = document.getElementById('edit-nick').value;
            const novoUser = document.getElementById('edit-user').value.trim();
            const novaBio = document.getElementById('edit-bio').value;
            const fotoData = document.getElementById('preview-photo').src;
            const bannerData = document.getElementById('preview-banner').src;

            const userAntigo = localStorage.getItem('usuarioLogado');
            const db = JSON.parse(localStorage.getItem('db_usuarios')) || {};

            // LÓGICA DA REGRA DE 7 DIAS PARA O @
            if (novoUser !== userAntigo) {
                const agora = Date.now();
                const ultimaTroca = localStorage.getItem('lastUserChange');
                const seteDiasEmMs = 7 * 24 * 60 * 60 * 1000;

                if (ultimaTroca && (agora - ultimaTroca < seteDiasEmMs)) {
                    const resta = Math.ceil((seteDiasEmMs - (agora - ultimaTroca)) / (1000 * 60 * 60 * 24));
                    alert(`Você só pode alterar o @ novamente em ${resta} dias.`);
                    return;
                }

                // Verificar se o novo @ já existe
                if (db[novoUser]) {
                    alert('Este @ já está em uso por outro usuário.');
                    return;
                }

                // Se trocou o @, atualiza o "banco de dados"
                db[novoUser] = db[userAntigo]; // Copia dados (incluindo ID fixo)
                delete db[userAntigo]; // Deleta entrada antiga
                localStorage.setItem('usuarioLogado', novoUser);
                localStorage.setItem('lastUserChange', agora.toString());
            }

            // Salvar demais informações
            localStorage.setItem('userNick', novoNick);
            localStorage.setItem('userBio', novaBio);
            localStorage.setItem('userPhoto', fotoData);
            localStorage.setItem('userBanner', bannerData);
            localStorage.setItem('db_usuarios', JSON.stringify(db));

            alert('Perfil atualizado com sucesso!');
            window.location.href = 'perfil.html';
        }
    </script>
</body>
</html>
