<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - Estilo YouTube</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="edit-page">

    <header class="navbar-topo">
        <div class="logo-container">
            <img src="icon.png" alt="Logo" class="site-icon">
            <span class="site-name">Project X - Alpha</span>
        </div>
        <button type="button" class="btn-topo-save" id="final-save">SALVAR</button>
    </header>

    <main class="edit-container">
        <div class="edit-item-box">
            <label>Foto de Perfil</label>
            <div class="preview-circle-container">
                <img src="user-photo.jpg" id="main-photo-view">
            </div>
            <label for="input-photo" class="btn-change">ALTERAR FOTO</label>
            <input type="file" id="input-photo" accept="image/*" hidden>
        </div>

        <div class="edit-item-box">
            <label>Banner do Canal</label>
            <div class="preview-banner-container">
                <img src="banner.jpg" id="main-banner-view">
            </div>
            <label for="input-banner" class="btn-change">ALTERAR BANNER</label>
            <input type="file" id="input-banner" accept="image/*" hidden>
        </div>

        <div class="edit-fields">
            <input type="text" id="nick-input" placeholder="Nome do Canal">
            <textarea id="bio-input" placeholder="Descrição"></textarea>
        </div>
    </main>

    <div id="modal-photo" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span onclick="closeModal('modal-photo')">← Cortar e girar</span>
                <button class="btn-confirm" id="confirm-photo">Salvar como foto do perfil</button>
            </div>
            <div class="crop-area-circle">
                <img id="crop-img-photo">
                <div class="circle-overlay"></div>
            </div>
        </div>
    </div>

    <div id="modal-banner" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span onclick="closeModal('modal-banner')">← Ajustar Banner</span>
                <button class="btn-confirm" id="confirm-banner">PRONTO</button>
            </div>
            <div class="crop-area-banner">
                <img id="crop-img-banner">
                <div class="banner-overlay-yt">
                    <div class="yt-tv">TV</div>
                    <div class="yt-desktop">Computador</div>
                    <div class="yt-all">Todos os dispositivos</div>
                </div>
            </div>
            <p class="yt-tip">O banner do canal será diferente em diferentes dispositivos.</p>
        </div>
    </div>

    <script>
        // Sistema de abertura de Modais e Leitura de Arquivo
        function handleImage(inputId, modalId, imgCropId) {
            document.getElementById(inputId).addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        document.getElementById(imgCropId).src = event.target.result;
                        document.getElementById(modalId).style.display = 'flex';
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        handleImage('input-photo', 'modal-photo', 'crop-img-photo');
        handleImage('input-banner', 'modal-banner', 'crop-img-banner');

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // Confirmar "Recorte" (Simulado)
        document.getElementById('confirm-photo').addEventListener('click', () => {
            document.getElementById('main-photo-view').src = document.getElementById('crop-img-photo').src;
            closeModal('modal-photo');
        });

        document.getElementById('confirm-banner').addEventListener('click', () => {
            document.getElementById('main-banner-view').src = document.getElementById('crop-img-banner').src;
            closeModal('modal-banner');
        });

        // SALVAMENTO FINAL (LocalStorage)
        document.getElementById('final-save').addEventListener('click', () => {
            localStorage.setItem('userNick', document.getElementById('nick-input').value);
            localStorage.setItem('userBio', document.getElementById('bio-input').value);
            localStorage.setItem('userPhoto', document.getElementById('main-photo-view').src);
            localStorage.setItem('userBanner', document.getElementById('main-banner-view').src);
            window.location.href = 'perfil.html';
        });

        // Carregar dados existentes
        window.onload = () => {
            if(localStorage.getItem('userNick')) document.getElementById('nick-input').value = localStorage.getItem('userNick');
            if(localStorage.getItem('userBio')) document.getElementById('bio-input').value = localStorage.getItem('userBio');
            if(localStorage.getItem('userPhoto')) document.getElementById('main-photo-view').src = localStorage.getItem('userPhoto');
            if(localStorage.getItem('userBanner')) document.getElementById('main-banner-view').src = localStorage.getItem('userBanner');
        };
    </script>
</body>
</html>
