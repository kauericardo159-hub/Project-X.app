<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - Project X</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="edit-page">

    <div class="edit-container">
        <h2>Editar Perfil</h2>

        <div class="input-group">
            <label>ID de Usuário (Não alterável)</label>
            <input type="text" id="edit-id" readonly style="opacity: 0.6; cursor: not-allowed;">
        </div>

        <div class="input-group">
            <label>Alterar Banner</label>
            <input type="file" id="input-banner" accept="image/*" onchange="previewImage(this, 'preview-banner')">
            <img id="preview-banner" class="preview-img-banner">
        </div>

        <div class="input-group">
            <label>Alterar Foto de Perfil</label>
            <p class="help-text">Dica: Use fotos quadradas para melhor ajuste automático.</p>
            <input type="file" id="input-photo" accept="image/*" onchange="previewImage(this, 'preview-photo')">
            <div class="photo-edit-frame">
                <img id="preview-photo" class="preview-img-photo">
            </div>
        </div>

        <div class="input-group">
            <label>Nome de Exibição</label>
            <input type="text" id="edit-nick" placeholder="Seu nome">
        </div>

        <div class="input-group">
            <label>Nome de Usuário (@)</label>
            <input type="text" id="edit-user" placeholder="@seu_nick">
            <small id="user-change-info" class="info-text"></small>
        </div>

        <div class="input-group">
            <label>Sobre mim</label>
            <textarea id="edit-bio" rows="4" placeholder="Conte algo sobre você..."></textarea>
        </div>

        <div class="edit-actions">
            <button class="btn-cancelar" onclick="window.location.href='perfil.html'">Cancelar</button>
            <button class="btn-confirmar" onclick="salvarAlteracoes()">Salvar Alterações</button>
        </div>
    </div>

    <script src="components.js"></script>
    <script>
        // Carregar dados atuais
        window.onload = function() {
            const savedUser = localStorage.getItem('usuarioLogado');
            const db = JSON.parse(localStorage.getItem('db_usuarios')) || {};
            const dados = db[savedUser] || {};

            // Preencher campos
            document.getElementById('edit-id').value = dados.id || "0";
            document.getElementById('edit-nick').value = localStorage.getItem('userNick') || "";
            document.getElementById('edit-user').value = savedUser || "";
            document.getElementById('edit-bio').value = localStorage.getItem('userBio') || "";
            document.getElementById('preview-photo').src = localStorage.getItem('userPhoto') || "user-photo.jpg";
            document.getElementById('preview-banner').src = localStorage.getItem('userBanner') || "banner.jpg";

            // Verificar regra dos 7 dias
            verificarDataTroca();
        };

        function previewImage(input, previewId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById(previewId).src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function verificarDataTroca() {
            const ultimaTroca = localStorage.getItem('dataUltimaTrocaUser');
            const infoText = document.getElementById('user-change-info');
            
            if (ultimaTroca) {
                const dataTroca = new Date(parseInt(ultimaTroca));
                const hoje = new Date();
                const diffDias = Math.ceil((hoje - dataTroca) / (1000 * 60 * 60 * 24));

                if (diffDias < 7) {
                    document.getElementById('edit-user').disabled = true;
                    infoText.innerText = `Você poderá alterar o @ novamente em ${7 - diffDias} dias.`;
                    infoText.style.color = "#ff4444";
                } else {
                    infoText.innerText = "O nome de usuário está disponível para alteração.";
                    infoText.style.color = "#44ff44";
                }
            }
        }

        function salvarAlteracoes() {
            const novoUser = document.getElementById('edit-user').value.trim();
            const antigoUser = localStorage.getItem('usuarioLogado');
            const db = JSON.parse(localStorage.getItem('db_usuarios')) || {};

            // Logica para troca de @ e os 7 dias
            if (novoUser !== antigoUser) {
                if (db[novoUser]) {
                    return alert("Este @ já está em uso!");
                }
                
                // Atualiza o "banco de dados"
                db[novoUser] = db[antigoUser];
                delete db[antigoUser];
                localStorage.setItem('db_usuarios', JSON.stringify(db));
                localStorage.setItem('usuarioLogado', novoUser);
                localStorage.setItem('dataUltimaTrocaUser', Date.now().toString());
            }

            // Salvar demais informações
            localStorage.setItem('userNick', document.getElementById('edit-nick').value);
            localStorage.setItem('userBio', document.getElementById('edit-bio').value);
            localStorage.setItem('userPhoto', document.getElementById('preview-photo').src);
            localStorage.setItem('userBanner', document.getElementById('preview-banner').src);

            alert("Perfil atualizado com sucesso!");
            window.location.href = 'perfil.html';
        }
    </script>
</body>
</html>
