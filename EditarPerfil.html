<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - Project X</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="edit-page">

    <header class="navbar-topo">
        <div class="logo-container">
            <img src="icon.png" alt="Logo" class="site-icon">
            <span class="site-name">Project X - Alpha</span>
        </div>
    </header>

    <main class="edit-container">
        <h2>Personalizar Perfil</h2>

        <form id="edit-form" class="edit-form">
            
            <div class="edit-section">
                <label>Banner do Perfil</label>
                <div class="banner-preview-container">
                    <img src="banner.jpg" id="preview-banner" class="img-fit">
                    <label for="input-banner" class="custom-file-upload">Alterar Banner</label>
                    <input type="file" id="input-banner" accept="image/*" style="display:none;">
                </div>
            </div>

            <div class="edit-section">
                <label>Foto de Perfil</label>
                <div class="foto-preview-container">
                    <img src="user-photo.jpg" id="preview-photo" class="foto-round">
                    <label for="input-photo" class="custom-file-upload">Trocar Foto</label>
                    <input type="file" id="input-photo" accept="image/*" style="display:none;">
                </div>
            </div>

            <div class="edit-section">
                <label for="nick-input">Nickname</label>
                <input type="text" id="nick-input" placeholder="Seu novo nome...">
            </div>

            <div class="edit-section">
                <label for="bio-input">Sobre mim</label>
                <textarea id="bio-input" rows="4" placeholder="Sua descrição..."></textarea>
            </div>

            <div class="edit-actions">
                <button type="button" id="btn-save" class="btn-save">Salvar Alterações</button>
                <button type="button" class="btn-cancel" onclick="window.location.href='perfil.html'">Cancelar</button>
            </div>
        </form>
    </main>

    <script>
        // Função para trocar o preview das imagens
        function setupPreview(inputId, imgId) {
            document.getElementById(inputId).addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        document.getElementById(imgId).src = event.target.result;
                    }
                    reader.readAsDataURL(file);
                }
            });
        }

        setupPreview('input-banner', 'preview-banner');
        setupPreview('input-photo', 'preview-photo');

        // Lógica de Salvamento Local (Persistência)
        document.getElementById('btn-save').addEventListener('click', function() {
            const nick = document.getElementById('nick-input').value;
            const bio = document.getElementById('bio-input').value;
            const banner = document.getElementById('preview-banner').src;
            const photo = document.getElementById('preview-photo').src;

            // Salva no navegador do usuário
            localStorage.setItem('userNick', nick);
            localStorage.setItem('userBio', bio);
            localStorage.setItem('userBanner', banner);
            localStorage.setItem('userPhoto', photo);

            alert('Perfil atualizado com sucesso!');
            window.location.href = 'perfil.html';
        });

        // Carregar dados salvos anteriormente ao abrir a página de edição
        window.onload = function() {
            if(localStorage.getItem('userNick')) document.getElementById('nick-input').value = localStorage.getItem('userNick');
            if(localStorage.getItem('userBio')) document.getElementById('bio-input').value = localStorage.getItem('userBio');
            if(localStorage.getItem('userBanner')) document.getElementById('preview-banner').src = localStorage.getItem('userBanner');
            if(localStorage.getItem('userPhoto')) document.getElementById('preview-photo').src = localStorage.getItem('userPhoto');
        }
    </script>
</body>
</html>
