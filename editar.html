<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Editor de Perfil</title>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-editor-full">

    <main class="editor-fullscreen">
        
        <div class="banner-edit-container" onclick="document.getElementById('inputBanner').click()">
            <div id="bannerPreviewContainer" class="preview-box">
                <img src="banner.jpg" id="imgBannerPreview" alt="Banner">
                <div class="overlay-edit">Alterar Banner</div>
            </div>
            <input type="file" id="inputBanner" hidden accept="image/*,video/*">
        </div>

        <div class="avatar-edit-container" onclick="document.getElementById('inputAvatar').click()">
            <div class="avatar-circle">
                <img src="user-photo.jpg" id="imgAvatarPreview" alt="Avatar">
                <div class="overlay-cam">📸</div>
            </div>
            <input type="file" id="inputAvatar" hidden accept="image/*">
        </div>

        <div class="form-container">
            <div class="input-modern">
                <label>Nome de Usuário</label>
                <input type="text" id="inputNick" placeholder="Seu novo nick...">
            </div>
            
            <div class="input-modern">
                <label>Biografia</label>
                <textarea id="inputBio" placeholder="Conte sobre você..."></textarea>
            </div>

            <div class="action-grid">
                <button class="btn-cancel-custom" onclick="triggerAviso()">Cancelar</button>
                <button class="btn-save-custom" onclick="salvarTudo()">Salvar Perfil</button>
            </div>
        </div>
    </main>

    <div id="modalCrop" class="modal-overlay">
        <div class="modal-content">
            <h3>Ajustar Enquadramento</h3>
            <p>Arraste para posicionar (Simulação de Recorte)</p>
            <div class="crop-area">
                <img id="imgToCrop" src="" alt="Ajuste">
                <div class="crop-guide"></div>
            </div>
            <div class="modal-buttons">
                <button onclick="fecharModal()">Cancelar</button>
                <button class="btn-confirm" onclick="confirmarCrop()">Confirmar Escolha</button>
            </div>
        </div>
    </div>

    <div id="modalAviso" class="modal-overlay">
        <div class="modal-content aviso">
            <div class="aviso-icon">⚠️</div>
            <h3>Alterações não salvas!</h3>
            <p>Você tem certeza que deseja sair? Todo o progresso será perdido.</p>
            <div class="modal-buttons vertical">
                <button class="btn-stay" onclick="fecharAviso()">Continuar Editando</button>
                <button class="btn-leave" onclick="window.location.href='perfil.html'">Sair e Descartar</button>
            </div>
        </div>
    </div>

    <script>
        let currentInput = '';
        let algoAlterado = false;

        // Monitorar mudanças para o aviso
        document.querySelectorAll('input, textarea').forEach(el => {
            el.oninput = () => algoAlterado = true;
        });

        // Lógica de Preview e Modal de Crop
        document.getElementById('inputBanner').onchange = e => abrirEditor(e, 'banner');
        document.getElementById('inputAvatar').onchange = e => abrirEditor(e, 'avatar');

        function abrirEditor(event, type) {
            currentInput = type;
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imgToCrop').src = e.target.result;
                    document.getElementById('modalCrop').classList.add('active');
                    if(type === 'banner') {
                        document.querySelector('.crop-guide').classList.add('rect');
                    } else {
                        document.querySelector('.crop-guide').classList.remove('rect');
                    }
                }
                reader.readAsDataURL(file);
            }
        }

        function confirmarCrop() {
            const tempSrc = document.getElementById('imgToCrop').src;
            if(currentInput === 'banner') {
                document.getElementById('imgBannerPreview').src = tempSrc;
            } else {
                document.getElementById('imgAvatarPreview').src = tempSrc;
            }
            algoAlterado = true;
            fecharModal();
        }

        function fecharModal() { document.getElementById('modalCrop').classList.remove('active'); }
        
        function triggerAviso() { 
            if(algoAlterado) document.getElementById('modalAviso').classList.add('active');
            else window.location.href = 'perfil.html';
        }

        function fecharAviso() { document.getElementById('modalAviso').classList.remove('active'); }

        function salvarTudo() {
            alert("Perfil atualizado com sucesso!");
            window.location.href = 'perfil.html';
        }
    </script>
</body>
</html>
