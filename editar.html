<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Digital | Configurações</title>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-edit">

    <header class="navbar">
        <div class="container-header">
            <a href="#" onclick="confirmarSaida(event)" class="btn-back">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </a>
            <h1 class="app-name">Editar <span>Perfil</span></h1>
        </div>
    </header>

    <main class="edit-container">
        <form id="editForm" class="edit-form-advanced">
            
            <div class="upload-section">
                <label>Banner do Perfil</label>
                <div class="banner-preview-edit" id="bannerPreview">
                    <span>Clique para alterar Banner (Vídeo/GIF/Foto)</span>
                    <input type="file" id="inputBanner" accept="image/*,video/*">
                </div>
            </div>

            <div class="avatar-upload-section">
                <div class="avatar-edit-wrapper">
                    <img src="user-photo.jpg" id="avatarPreviewImg" alt="Avatar Preview">
                    <input type="file" id="inputAvatar" accept="image/*">
                    <div class="cam-icon">📸</div>
                </div>
                <label>Foto de Perfil</label>
            </div>

            <div class="input-group">
                <label for="newNick">Novo Nickname</label>
                <input type="text" id="newNick" placeholder="Digite seu novo nick..." maxlength="25">
            </div>

            <div class="edit-actions">
                <button type="button" class="btn-cancel" onclick="confirmarSaida(event)">Cancelar</button>
                <button type="submit" class="btn-save-final">Salvar Alterações</button>
            </div>
        </form>
    </main>

    <script>
        const form = document.getElementById('editForm');
        let alterado = false;

        // Detecta se algo foi alterado para avisar antes de sair
        form.addEventListener('input', () => alterado = true);

        function confirmarSaida(e) {
            e.preventDefault();
            if (alterado) {
                if (confirm("Você tem alterações não salvas! Deseja realmente sair?")) {
                    window.location.href = "perfil.html";
                }
            } else {
                window.location.href = "perfil.html";
            }
        }

        // Aviso ao tentar atualizar a página (F5)
        window.onbeforeunload = function() {
            if (alterado) {
                return "Você perderá as alterações se atualizar a página!";
            }
        };

        // Feedback de salvamento
        form.onsubmit = function(e) {
            e.preventDefault();
            alert("Alterações salvas com sucesso!");
            alterado = false;
            window.location.href = "perfil.html";
        };
    </script>

</body>
</html>
