<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Editar Perfil</title>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body class="editing-mode">

    <main class="edit-fullscreen">
        
        <form id="profileForm" class="form-container">
            
            <div class="edit-field">
                <label>Banner</label>
                <div class="banner-preview-box" id="bannerContainer">
                    <img src="banner.jpg" id="currentBanner" class="preview-img">
                    <input type="file" id="fileBanner" accept="image/*,video/*,image/gif">
                    <div class="overlay-edit">Alterar Banner</div>
                </div>
            </div>

            <div class="edit-field avatar-field">
                <div class="avatar-preview-box">
                    <img src="user-photo.jpg" id="currentAvatar" class="preview-img">
                    <input type="file" id="fileAvatar" accept="image/*,image/gif">
                    <div class="overlay-edit">Alterar</div>
                </div>
                <label>Foto de Perfil</label>
            </div>

            <div class="edit-field">
                <label>Nickname</label>
                <input type="text" id="inputNick" placeholder="Seu novo nick..." maxlength="20">
            </div>

            <div class="edit-field">
                <label>Sobre a mim</label>
                <textarea id="inputBio" placeholder="Conte algo sobre você..." rows="3"></textarea>
            </div>

            <div class="action-footer">
                <button type="button" class="btn-cancel" onclick="triggerModal()">Cancelar</button>
                <button type="submit" class="btn-save-confirm">Salvar Alterações</button>
            </div>
        </form>
    </main>

    <div id="cropModal" class="modal-crop">
        <div class="crop-content">
            <h3>Ajustar Mídia</h3>
            <div class="crop-area" id="cropArea">
                </div>
            <div class="crop-footer">
                <button onclick="closeCrop()">Cancelar</button>
                <button class="confirm-crop" onclick="saveCrop()">Confirmar Quadro</button>
            </div>
        </div>
    </div>

    <div id="alertModal" class="modal-alert">
        <div class="alert-content">
            <p>Você tem alterações não salvas. Deseja realmente sair?</p>
            <div class="alert-btns">
                <button onclick="closeAlert()">Continuar Editando</button>
                <button class="confirm-exit" onclick="exitToProfile()">Sair e Perder</button>
            </div>
        </div>
    </div>

    <script>
        // Sistema de Preview e Simulação de Edição
        const fileInputs = [
            { input: 'fileBanner', target: 'currentBanner' },
            { input: 'fileAvatar', target: 'currentAvatar' }
        ];

        fileInputs.forEach(item => {
            document.getElementById(item.input).addEventListener('change', function(e) {
                if (e.target.files && e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = function(val) {
                        // Abre o modal de "Corte/Ajuste" antes de aplicar
                        document.getElementById('cropArea').innerHTML = `<img src="${val.target.result}" style="max-width:100%; max-height:300px;">`;
                        document.getElementById('cropModal').classList.add('active');
                        
                        // Salva referência da imagem temporariamente
                        window.tempImg = val.target.result;
                        window.tempTarget = item.target;
                    }
                    reader.readAsDataURL(e.target.files[0]);
                }
            });
        });

        function saveCrop() {
            document.getElementById(window.tempTarget).src = window.tempImg;
            closeCrop();
        }

        function closeCrop() { document.getElementById('cropModal').classList.remove('active'); }
        function triggerModal() { document.getElementById('alertModal').classList.add('active'); }
        function closeAlert() { document.getElementById('alertModal').classList.remove('active'); }
        function exitToProfile() { window.location.href = 'perfil.html'; }

        // Salvamento Simulado (LocalStorage para persistência)
        document.getElementById('profileForm').onsubmit = (e) => {
            e.preventDefault();
            alert("Perfil Atualizado com Sucesso!");
            window.location.href = 'perfil.html';
        };
    </script>

</body>
</html>
