<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil | Nexus Digital</title>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-edit">

    <header class="navbar">
        <div class="container-header">
            <a href="perfil.html" class="btn-back">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </a>
            <h1 class="app-name">Editar <span>Perfil</span></h1>
        </div>
    </header>

    <main class="edit-container">
        <form class="edit-form">
            
            <div class="input-group">
                <label for="nickname">Seu Nick</label>
                <input type="text" id="nickname" placeholder="@exemplo" maxlength="20">
            </div>

            <div class="status-selection">
                <label>Definir Status</label>
                <div class="status-grid">
                    <label class="status-option">
                        <input type="radio" name="status" value="online" checked>
                        <div class="status-box">
                            <img src="status-online.png" alt="Online">
                            <span>Online</span>
                        </div>
                    </label>

                    <label class="status-option">
                        <input type="radio" name="status" value="ausente">
                        <div class="status-box">
                            <img src="status-ausente.png" alt="Ausente">
                            <span>Ausente</span>
                        </div>
                    </label>

                    <label class="status-option">
                        <input type="radio" name="status" value="inatico">
                        <div class="status-box">
                            <img src="status-inatico.png" alt="Inático">
                            <span>Inático</span>
                        </div>
                    </label>

                    <label class="status-option">
                        <input type="radio" name="status" value="offline">
                        <div class="status-box">
                            <img src="status-offline.png" alt="Offline">
                            <span>Offline</span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="input-group">
                <label for="bio">Sobre a mim</label>
                <textarea id="bio" rows="4" placeholder="Escreva algo sobre você..."></textarea>
            </div>

            <button type="button" class="btn-save">Salvar Alterações</button>
        </form>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <img src="home-icon.png" alt="Início" class="nav-icon">
            <span>Início</span>
        </a>
        <a href="perfil.html" class="nav-item">
            <img src="profile-icon.png" alt="Perfil" class="nav-icon">
            <span>Perfil</span>
        </a>
    </nav>

</body>
</html>
